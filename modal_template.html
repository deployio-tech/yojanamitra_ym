<!-- Scheme Details Modal -->
<div class="modal fade" id="schemeDetailsModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Scheme Information</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
                <div id="modal-loader" class="text-center py-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2 text-muted">Loading details...</p>
                </div>
                <div id="modal-content-area" style="display: none;">
                    <!-- Header -->
                    <div class="mb-4 pb-3 border-bottom">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span id="modal-category" class="badge bg-primary">Category</span>
                            <span id="modal-match" class="badge bg-success">Match</span>
                        </div>
                        <h4 id="modal-name" class="fw-bold"></h4>
                        <p id="modal-description" class="text-muted mb-0"></p>
                    </div>

                    <!-- Benefits -->
                    <div class="mb-4">
                        <h6 class="fw-bold text-dark"><i class="fas fa-gift me-2 text-primary"></i>Benefits</h6>
                        <div id="modal-benefits" style="white-space: pre-wrap; line-height: 1.8;"></div>
                    </div>

                    <!-- Eligibility -->
                    <div class="mb-4">
                        <h6 class="fw-bold text-dark"><i class="fas fa-user-check me-2 text-success"></i>Eligibility
                        </h6>
                        <div id="modal-eligibility" style="white-space: pre-wrap; line-height: 1.8;"></div>
                    </div>

                    <!-- Exclusions -->
                    <div class="mb-4" id="modal-exclusions-section" style="display: none;">
                        <h6 class="fw-bold text-dark"><i
                                class="fas fa-exclamation-triangle me-2 text-danger"></i>Exclusions</h6>
                        <div id="modal-exclusions" class="alert alert-warning"
                            style="white-space: pre-wrap; line-height: 1.8;"></div>
                    </div>

                    <!-- Application Process -->
                    <div class="mb-4" id="modal-process-section" style="display: none;">
                        <h6 class="fw-bold text-dark"><i class="fas fa-clipboard-list me-2 text-info"></i>Application
                            Process</h6>
                        <div id="modal-process" style="white-space: pre-wrap; line-height: 1.8;"></div>
                    </div>

                    <!-- Documents Required -->
                    <div class="mb-0" id="modal-docs-section" style="display: none;">
                        <h6 class="fw-bold text-dark"><i class="fas fa-file-alt me-2 text-warning"></i>Documents
                            Required</h6>
                        <div id="modal-docs" style="white-space: pre-wrap; line-height: 1.8;"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer bg-light">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <a id="modal-apply-btn" href="#" target="_blank" class="btn btn-primary">
                    <i class="fas fa-external-link-alt me-2"></i>Visit Official Portal
                </a>
            </div>
        </div>
    </div>
</div>
