<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>YojanaMitra — My Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth
    }

    :root {
      --blue: #e69000;
      --blue-hover: #c97a0a;
      --blue-soft: #fff5e1;
      --blue-mid: #ffe0b2;
      --orange: #f97316;
      --orange-soft: #fff3eb;
      --green: #0a8a5e;
      --green-soft: #e6f7f2;
      --amber: #c97a0a;
      --amber-soft: #fef6e4;
      --red: #c42626;
      --red-soft: #fef0f0;
      --purple: #5b35c8;
      --purple-soft: #f2effe;
      --ink: #0b1a16;
      --ink-2: #2d3a35;
      --muted: #5a6a64;
      --muted-2: #a1b0a8;
      --line: #cbe0d4;
      --line-2: #e0ebd5;
      --surface: #f0f5ec;
      --white: #ffffff;
      --page: #c9ded0;
      --accent: #ffa000;
      --accent-dark: #e69000;
      --accent-light: #fff5e1;
      --font: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background-image: radial-gradient(rgba(11, 26, 22, 0.05) 1.5px, transparent 1.5px);
      background-size: 32px 32px;
      font-family: var(--font);
      background-color: var(--page);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased
    }

    a {
      text-decoration: none;
      color: inherit
    }

    i.fas,
    i.fa-solid {
      font-family: "Font Awesome 6 Free" !important;
      font-weight: 900
    }

    /* ═══════════════════════════════════════════
       GLOBAL HEADER
    ═══════════════════════════════════════════ */
    header#global-header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(255, 255, 255, 0.60);
      backdrop-filter: blur(40px) saturate(220%);
      -webkit-backdrop-filter: blur(40px) saturate(220%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.08), 0 1px 0 rgba(255, 255, 255, 0.9) inset;
      padding: 0 40px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1.25rem;
      color: #0f1117;
      letter-spacing: -0.02em;
      flex-shrink: 0;
      text-decoration: none !important
    }

    .logo:hover {
      color: #ffa000
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #ffa000;
      display: grid;
      place-items: center;
      color: white;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: -0.5px
    }

    header#global-header nav {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-left: auto
    }

    header#global-header nav a {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #5a6a64;
      transition: background .18s, color .18s;
      white-space: nowrap;
      text-decoration: none !important
    }

    header#global-header nav a:hover {
      background: #f0f5ec;
      color: #0b1a16
    }

    header#global-header nav a.active {
      color: #ffa000;
      font-weight: 600
    }

    header#global-header nav a.nav-cta {
      background: #f97316;
      color: white !important;
      border-radius: 100px;
      padding: 9px 20px;
      font-weight: 700;
      font-size: 0.875rem;
      text-decoration: none !important
    }

    header#global-header nav a.nav-cta:hover {
      background: #ea6a0a;
      color: white !important
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0
    }

    .btn-ghost {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: #5a6a64;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1.5px solid #cbe0d4;
      background: white;
      cursor: pointer;
      font-family: var(--font);
      text-decoration: none !important;
      transition: border-color .18s, color .18s
    }

    .btn-ghost:hover {
      border-color: #ffa000;
      color: #ffa000
    }

    .admin-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.82rem;
      font-weight: 700;
      color: #e11d48;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none !important;
      transition: background .18s
    }

    .admin-btn:hover {
      background: #fff1f2;
      color: #be123c
    }

    .translate-wrap {
      position: relative;
      display: flex;
      align-items: center
    }

    #translate-fab {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 160, 0, 0.08);
      border: 1.5px solid rgba(255, 160, 0, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      outline: none;
      flex-shrink: 0;
      transition: background .2s, transform .15s
    }

    #translate-fab:hover {
      background: rgba(255, 160, 0, 0.15);
      transform: scale(1.08)
    }

    #translate-fab svg {
      width: 16px;
      height: 16px;
      stroke: #ffa000
    }

    #translate-panel,
    #translate-panel-header {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 200px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 16px;
      padding: 6px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.10);
      display: none;
      z-index: 9999
    }

    #translate-panel.open {
      display: block;
      animation: tpIn .17s ease
    }

    @keyframes tpIn {
      from {
        opacity: 0;
        transform: translateY(-6px) scale(.97)
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    .tp-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #9ca3af;
      padding: 4px 10px 8px
    }

    .tp-lang {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      transition: background .14s
    }

    .tp-lang:hover {
      background: rgba(255, 160, 0, 0.09);
      color: #ffa000
    }

    .tp-lang.active {
      background: rgba(255, 160, 0, 0.12);
      color: #ffa000;
      font-weight: 600
    }

    .tp-lang .flag {
      font-size: 15px;
      line-height: 1
    }

    .tp-divider {
      height: 1px;
      background: rgba(0, 0, 0, 0.07);
      margin: 4px 0
    }

    #google_translate_element {
      display: none !important
    }

    .goog-te-banner-frame {
      display: none !important
    }

    .skiptranslate:not(#translate-panel):not(.translate-wrap) {
      display: none !important
    }
