project:
  name: yojana-mitra
  root: c:\yojanamitra_complete
  primary_type: backend
  languages:
    - Python
    - JavaScript
    - TypeScript
  frameworks:
    - Flask
    - React
    - Remotion

backend:
  entrypoints:
    - app.py
  api_patterns:
    - /api/recommendations
    - /api/readiness/check
    - /api/readiness/verify-pool
    - /api/readiness/re-evaluate
    - /api/resolve-questions
  data_store:
    - SQLite (project-local db)
  core_modules:
    - app/engine/eligibility.py
    - app/engine/questions.py
    - contextual_resolver.py
    - unified_profile_engine.py

features:
  - Deterministic demographic filtering (age, gender, income, state)
  - Eligibility bucketization (eligible/possibly-eligible/ineligible)
  - Readiness verification with clarification history retrieval
  - AI-driven contextual gap detection and question generation
  - 32-character question hash based routing for contextual answers
  - Re-evaluation with SchemeClarification UPSERT and verdict update
  - End-to-end V3 hybrid lifecycle tests in tests/test_v3_hybrid_real_system.py

testing:
  frameworks:
    - pytest
  notable_suites:
    - tests/test_v3_hybrid_real_system.py
    - tests/test_integration_real_system.py
  test_orchestration_files:
    - testsprite_v3_hybrid_real_system.py
    - run_v3_hybrid_tests.py
