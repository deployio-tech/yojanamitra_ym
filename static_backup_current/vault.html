<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Document Vault - YojanaMitra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --accent: #f59e0b;
        }

        body {
            background-color: #f8fafc;
        }

        .upload-zone {
            background: white;
            border: 2px dashed #e2e8f0;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
            position: relative;
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.05);
        }

        .upload-zone i {
            font-size: 40px;
            color: var(--secondary);
            margin-bottom: 15px;
        }

        .doc-card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #94a3b8;
            border: none;
            background: none;
            cursor: pointer;
            transition: color 0.2s;
            font-size: 1rem;
            padding: 5px;
            z-index: 2;
        }

        .delete-btn:hover {
            color: #ef4444;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .data-table {
            width: 100%;
            font-size: 0.9rem;
        }

        .data-table th {
            color: var(--secondary);
            font-weight: 600;
            width: 40%;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .data-table td {
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg sticky-top border-bottom border-secondary border-opacity-10"
        style="backdrop-filter: blur(20px); background: rgba(255, 255, 255, 0.9);">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="fas fa-handshake" style="color: #2563eb; font-size: 1.8rem; margin-right: 0.5rem;"></i>
                <span style="color: #0f172a; font-size: 1.3rem; font-weight: 700;">Yojana Mitra</span>
            </a>
            <div class="d-flex align-items-center gap-3 ms-auto">
                <div id="google_translate_element"></div>
                <a href="/all-schemes" class="btn btn-outline-primary btn-sm">
                    <i class="fas fa-list me-2"></i> Schemes
                </a>
                <a href="/vault.html" class="btn btn-outline-primary btn-sm active">
                    <i class="fas fa-shield-halved me-2"></i> My Vault
                </a>
                <a href="/" class="btn btn-outline-primary btn-sm">
                    <i class="fas fa-home me-2"></i> Home
                </a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold mb-1">Document Vault</h2>
                <p class="text-muted">Securely store and verify your documents with AI power.</p>
            </div>
            <div class="d-flex gap-2">
                <button id="syncBtn" class="btn btn-success rounded-pill px-4 shadow-sm" onclick="syncProfile()">
                    <i class="fas fa-file-import me-2"></i> Sync to Profile
                </button>
                <button class="btn btn-primary rounded-pill px-4 shadow-sm" onclick="checkMismatches()">
                    <i class="fas fa-sync me-2"></i> Audit Profile
                </button>
            </div>
        </div>

        <!-- Audit Panel -->
        <div id="auditResults" class="mb-5" style="display:none;">
            <div class="card border-0 shadow-sm bg-danger bg-opacity-10" style="border-radius: 15px;">
                <div class="card-body p-4">
                    <h5 class="fw-bold text-danger mb-4 d-flex align-items-center">
                        <i class="fas fa-triangle-exclamation me-2"></i> Document Mismatches Found
                    </h5>
                    <div id="issuesList"></div>
                </div>
            </div>
        </div>

        <!-- Upload Zone -->
        <div class="upload-zone shadow-sm mb-5" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div id="uploadLoader"
                style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:10; flex-direction:column; justify-content:center; align-items:center; border-radius:12px;">
                <div class="spinner mb-3"></div>
                <p class="fw-medium text-primary m-0">AI is analyzing your document... ✨</p>
            </div>
            <i class="fas fa-cloud-upload-alt mb-3 d-block"></i>
            <h4 class="fw-bold">Upload New Document</h4>
            <p class="text-muted small">Drag & Drop or click to browse (JPG, PNG, PDF)</p>
            <input type="file" id="fileInput" hidden multiple accept="image/*,.pdf">
        </div>

        <!-- Doc Grid -->
        <div class="row g-4" id="docGrid">
            <!-- Documents will load here -->
        </div>
    </div>

    <!-- Details Modal -->
    <div class="modal fade" id="docDetailsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header border-0 p-4">
                    <h5 class="modal-title fw-bold" id="modalDocTitle">Document Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                        onclick="closeModal()"></button>
                </div>
                <div class="modal-body p-4 pt-0">
                    <div id="modalDataArea"></div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light rounded-pill w-100 fw-medium" data-bs-dismiss="modal"
                        onclick="closeModal()">Close Window</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadDocuments);

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        async function handleFiles(files) {
            const loader = document.getElementById('uploadLoader');
            loader.style.display = 'flex';
            for (let file of files) {
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const res = await fetch('/api/documents/upload', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.error) alert(data.error);
                } catch (err) { console.error('Upload failed', err); }
            }
            loader.style.display = 'none';
            loadDocuments();
            checkMismatches();
        }

        async function loadDocuments() {
            const grid = document.getElementById('docGrid');
            try {
                const res = await fetch('/api/documents');
                const data = await res.json();
                grid.innerHTML = data.documents.length ? '' : '<div class="col-12 text-center text-muted py-5"><i class="fas fa-folder-open mb-3 fa-3x d-block opacity-25"></i>No documents found</div>';

                data.documents.forEach(doc => {
                    const col = document.createElement('div');
                    col.className = 'col-md-6 col-lg-4';
                    col.innerHTML = `
                        <div class="card h-100 border-0 shadow-sm doc-card-hover" style="border-radius: 12px; transition: all 0.2s;">
                            <div class="card-body d-flex flex-column p-4 position-relative">
                                <button class="delete-btn" onclick="deleteDocument(${doc.id})"><i class="fas fa-trash-alt"></i></button>
                                <div class="mb-3">
                                    <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-10 rounded-pill px-3 py-2">
                                        ${doc.docType}
                                    </span>
                                    <span class="ms-2 small text-muted font-monospace">${Math.round(doc.confidenceScore * 100)}% Match</span>
                                </div>
                                <h5 class="fw-bold mb-4" style="color: #1e293b;">Uploaded: ${new Date(doc.uploadDate).toLocaleDateString()}</h5>
                                <div class="mt-auto d-grid gap-2">
                                    <button onclick='showDocDetails(${JSON.stringify(doc)})' class="btn btn-outline-primary btn-sm rounded-pill fw-medium">
                                        <i class="fas fa-list me-2 small"></i> View Details
                                    </button>
                                    <a href="${doc.url}" target="_blank" class="btn btn-light btn-sm rounded-pill border fw-medium text-secondary">
                                        <i class="fas fa-file-alt me-2 small"></i> View Original
                                    </a>
                                </div>
                            </div>
                        </div>`;
                    grid.appendChild(col);
                });
            } catch (err) { console.error('Load failed', err); }
        }

        async function deleteDocument(docId) {
            if (!confirm('Are you sure you want to delete this document?')) return;
            try {
                const res = await fetch(`/api/documents/${docId}`, { method: 'POST' });
                if (res.ok) { loadDocuments(); checkMismatches(); }
                else { alert('Failed to delete'); }
            } catch (err) { alert('Connection error'); }
        }

        function showDocDetails(doc) {
            const modal = new bootstrap.Modal(document.getElementById('docDetailsModal'));
            document.getElementById('modalDocTitle').textContent = `${doc.docType} Analysis`;
            const extracted = doc.extractedData || {};
            let html = '<table class="data-table"><tbody>';
            for (const [k, v] of Object.entries(extracted)) {
                html += `<tr><th>${k}</th><td>${typeof v === 'object' ? JSON.stringify(v) : v}</td></tr>`;
            }
            html += '</tbody></table>';
            document.getElementById('modalDataArea').innerHTML = html;
            modal.show();
        }

        function closeModal() {
            const modal = bootstrap.Modal.getInstance(document.getElementById('docDetailsModal'));
            if (modal) modal.hide();
        }

        async function checkMismatches() {
            const panel = document.getElementById('auditResults');
            const list = document.getElementById('issuesList');
            try {
                const res = await fetch('/api/documents/cross-validate');
                const data = await res.json();
                if (data.issues && data.issues.length > 0) {
                    panel.style.display = 'block';
                    list.innerHTML = data.issues.map(issue => `
                        <div class="p-3 mb-2 bg-white rounded-3 shadow-sm border-start border-danger border-4">
                            <h6 class="fw-bold text-dark m-0">${issue.type}</h6>
                            <p class="small text-muted m-1">${issue.message}</p>
                            <div class="small text-success mt-1">💡 Suggestion: ${issue.suggestion}</div>
                        </div>`).join('');
                } else { panel.style.display = 'none'; }
            } catch (err) { console.error(err); }
        }

        async function syncProfile() {
            if (!confirm("This will scan your uploaded documents (Aadhaar, Income Certificate, etc.) and automatically update your profile details (Name, DOB, Income, Caste, etc.). Existing data may be overwritten. Continue?")) return;

            const btn = document.getElementById('syncBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Syncing...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/documents/sync-profile', { method: 'POST' });
                const data = await res.json();

                if (res.ok) {
                    if (data.fields && data.fields.length > 0) {
                        alert("✅ Success! Updated: " + data.fields.join(", "));
                    } else {
                        alert("ℹ️ Profile is already up to date. No new data found in documents.");
                    }
                } else {
                    alert("❌ Error: " + data.error);
                }
            } catch (err) {
                console.error(err);
                alert("❌ Connection failed.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'kn,hi,mr,ta,te,en',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript"
        src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>

</html>
